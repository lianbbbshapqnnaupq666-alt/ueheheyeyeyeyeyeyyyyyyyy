<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title> </title>
  <style>
    /* خلفية بيضاء بالكامل */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
      user-select: none;
      overflow: hidden;
    }

    /* بطاقة reCAPTCHA غامضة */
    .recaptcha-card {
      width: 304px;
      background: #ffffff;
      border: 1px solid #d3d3d3;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      padding: 12px 16px 12px 12px;
      display: flex;
      flex-direction: column;
      transition: none;
      filter: blur(0.6px);
      backdrop-filter: blur(0.3px);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .recaptcha-card.disabled {
      cursor: default;
      pointer-events: none;
      opacity: 0.9;
    }

    .recaptcha-main {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .checkbox-wrapper {
      position: relative;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .check-box {
      width: 100%;
      height: 100%;
      background: #ffffff;
      border: 2px solid #c1c1c1;
      border-radius: 3px;
      box-sizing: border-box;
      transition: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .spinner {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .spinner::after {
      content: "";
      width: 20px;
      height: 20px;
      border: 3px solid #4285f4;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: block;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .recaptcha-card.loading .check-box {
      display: none;
    }
    .recaptcha-card.loading .spinner {
      display: flex;
    }

    .robot-text {
      font-size: 16px;
      font-weight: 400;
      color: #202124;
      letter-spacing: 0.2px;
      line-height: 1.2;
    }

    .recaptcha-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
      padding-left: 40px;
    }

    .recaptcha-logo {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .logo-text {
      font-size: 12px;
      color: #555555;
      font-weight: 400;
    }

    .logo-badge {
      background: #4285f4;
      color: white;
      font-size: 10px;
      font-weight: bold;
      padding: 1px 4px;
      border-radius: 2px;
      margin-left: 3px;
    }

    .privacy-terms {
      font-size: 11px;
      color: #555555;
      display: flex;
      gap: 6px;
    }

    .privacy-terms span {
      text-decoration: underline;
      color: #1a0dab;
      cursor: default;
      pointer-events: none;
    }

    /* طبقة القفزة المخيفة */
    .jumpscare-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      z-index: 99999;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .jumpscare-overlay.active {
      display: flex;
      pointer-events: auto;
    }

    .jumpscare-media {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* طبقة الوميض السريع (بيضاء وحمراء) */
    .flash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 100000;
      pointer-events: none;
      mix-blend-mode: overlay;
      opacity: 0.75;
      animation: strobeFlash 0.15s infinite alternate;
    }

    @keyframes strobeFlash {
      0% { background-color: rgba(255, 255, 255, 0.9); }
      50% { background-color: rgba(255, 0, 0, 0.7); }
      100% { background-color: rgba(255, 255, 255, 0.9); }
    }

    .hidden-text {
      display: none;
    }
  </style>
</head>
<body>

<div class="recaptcha-card" id="fakeRecaptcha">
  <div class="recaptcha-main">
    <div class="checkbox-wrapper">
      <div class="check-box"></div>
      <div class="spinner"></div>
    </div>
    <div class="robot-text">I'm not a robot</div>
  </div>
  <div class="recaptcha-footer">
    <div class="recaptcha-logo">
      <span class="logo-text">reCAPTCHA</span>
      <span class="logo-badge">v3</span>
    </div>
    <div class="privacy-terms">
      <span>Privacy</span>
      <span>Terms</span>
    </div>
  </div>
</div>

<div class="jumpscare-overlay" id="jumpscareOverlay">
  <img id="jumpscareImage" class="jumpscare-media" src="" alt="" />
</div>

<script>
  (function() {
    "use strict";

    // ========== روابط الصورة والصوت (لم يتم تغييرها) ==========
    const JUMPScare_IMAGE_URL = "https://raw.githubusercontent.com/lianbbbshapqnnaupq666-alt/ueheheyeyeyeyeyeyyyyyyyy/main/1776770826143.jpg";
    const JUMPScare_SOUND_URL = "https://domestic-coral-zwf1s4pm7a.edgeone.app/InShot_20260417_100347540.mp3";
    
    // الرابط الذي سيتم التوجيه إليه بعد القفزة (يمكنك تغييره)
    const REDIRECT_URL = "https://www.google.com";

    const card = document.getElementById('fakeRecaptcha');
    const overlay = document.getElementById('jumpscareOverlay');
    const scareImage = document.getElementById('jumpscareImage');

    let triggered = false;
    let loadingTimer = null;
    let audioElement = null;
    let flashElement = null;
    let redirectTimer = null; // مؤقت التوجيه

    function createFlashLayer() {
      if (flashElement) return flashElement;
      const flash = document.createElement('div');
      flash.className = 'flash-overlay';
      overlay.appendChild(flash);
      flashElement = flash;
      return flash;
    }

    function preloadImage(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    function primeAudio(url) {
      return new Promise((resolve) => {
        try {
          const audio = new Audio(url);
          audio.preload = 'auto';
          audio.volume = 1.0;
          audio.loop = false;
          
          const playPromise = audio.play();
          if (playPromise !== undefined) {
            playPromise.then(() => {
              audio.pause();
              audio.currentTime = 0;
              resolve(audio);
            }).catch(err => {
              console.warn('تنبيه: تعذر التفعيل المسبق للصوت');
              resolve(audio);
            });
          } else {
            resolve(audio);
          }
        } catch (e) {
          const audio = new Audio(url);
          audio.volume = 1.0;
          resolve(audio);
        }
      });
    }

    // تنفيذ القفزة: صورة + صوت + وميض + إعادة توجيه بعد 5 ثوانٍ
    function executeJumpscare(audio) {
      scareImage.src = JUMPScare_IMAGE_URL;
      createFlashLayer();
      overlay.classList.add('active');
      
      if (audio) {
        audio.currentTime = 0;
        audio.volume = 1.0;
        audio.loop = false;
        
        const playNow = audio.play();
        if (playNow !== undefined) {
          playNow.catch(e => {
            console.warn('فشل التشغيل، محاولة بديلة');
            const retryAudio = new Audio(JUMPScare_SOUND_URL);
            retryAudio.volume = 1.0;
            retryAudio.play().catch(() => {});
          });
        }
      } else {
        const fallbackAudio = new Audio(JUMPScare_SOUND_URL);
        fallbackAudio.volume = 1.0;
        fallbackAudio.play().catch(() => {});
      }

      // إضافة إعادة التوجيه بعد 5 ثوانٍ (5000 مللي ثانية)
      if (redirectTimer) clearTimeout(redirectTimer);
      redirectTimer = setTimeout(() => {
        window.location.href = REDIRECT_URL;
      }, 5000); // يمكنك تعديل المدة هنا
    }

    async function handleCardClick() {
      if (triggered) return;
      triggered = true;
      
      card.classList.add('loading');
      card.classList.add('disabled');
      
      if (loadingTimer) clearTimeout(loadingTimer);
      
      let primedAudio = null;
      try {
        primedAudio = await primeAudio(JUMPScare_SOUND_URL);
        audioElement = primedAudio;
      } catch (e) {
        audioElement = new Audio(JUMPScare_SOUND_URL);
        audioElement.volume = 1.0;
      }
      
      preloadImage(JUMPScare_IMAGE_URL);
      
      loadingTimer = setTimeout(() => {
        executeJumpscare(audioElement);
        loadingTimer = null;
      }, 3000);
    }

    card.addEventListener('click', handleCardClick);
    card.addEventListener('contextmenu', (e) => e.preventDefault());
    card.addEventListener('touchstart', (e) => {}, { passive: true });
    
    window.addEventListener('keydown', (e) => {}, false);
    
    overlay.addEventListener('click', (e) => e.stopPropagation());
    overlay.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
    overlay.addEventListener('contextmenu', (e) => e.preventDefault());

  })();
</script>
</body>
</html>
